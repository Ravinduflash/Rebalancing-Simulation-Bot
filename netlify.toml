[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "api"
  node_bundler = "esbuild"

# Bots routes: all go to the unified "bots" function
[[redirects]]
  from = "/api/bots/*"
  to = "/.netlify/functions/bots"
  status = 200

[[redirects]]
  from = "/api/bots"
  to = "/.netlify/functions/bots"
  status = 200

# Other API routes: map directly to their function files
[[redirects]]
  from = "/api/tick"
  to = "/.netlify/functions/tick"
  status = 200

[[redirects]]
  from = "/api/prices"
  to = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
